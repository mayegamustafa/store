events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # Proxy settings
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection 'upgrade';
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_cache_bypass $http_upgrade;

  # ── Buyer Web (www.totalstore.ug / totalstore.ug) ──────────────────────────
  server {
    listen 80;
    server_name totalstore.ug www.totalstore.ug localhost;

    location / {
      proxy_pass http://web:3000;
    }
  }

  # ── Admin Panel (admin.totalstore.ug) ─────────────────────────────────────
  server {
    listen 80;
    server_name admin.totalstore.ug;

    location / {
      proxy_pass http://admin:3002;
    }
  }

  # ── Seller Dashboard (seller.totalstore.ug) ───────────────────────────────
  server {
    listen 80;
    server_name seller.totalstore.ug;

    location / {
      proxy_pass http://seller:3003;
    }
  }

  # ── API (api.totalstore.ug) ───────────────────────────────────────────────
  server {
    listen 80;
    server_name api.totalstore.ug;

    # Rate limiting for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    location /api/auth {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api:3001;
    }

    # WebSocket support for tracking
    location /tracking {
      proxy_pass http://api:3001;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Swagger docs (restrict in production)
    location /api/docs {
      proxy_pass http://api:3001;
    }

    location / {
      proxy_pass http://api:3001;
      client_max_body_size 20M;
    }
  }
}
