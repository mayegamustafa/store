########################################################################
# nginx.local.conf
# Single-port path-based routing for local development
#
#   docker run --rm -p 8080:8080 \
#     --network host \
#     -v $(pwd)/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro \
#     nginx:alpine
#
# Routes:
#   localhost:8080/         → Web buyer app    (port 3000)
#   localhost:8080/admin    → Admin panel       (port 3002)
#   localhost:8080/seller   → Seller dashboard  (port 3003)
#   localhost:8080/api      → Backend API       (port 3001)
########################################################################

events {
  worker_connections 512;
}

http {
  proxy_http_version 1.1;
  proxy_set_header Upgrade    $http_upgrade;
  proxy_set_header Connection 'upgrade';
  proxy_set_header Host       $host;
  proxy_set_header X-Real-IP  $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_cache_bypass $http_upgrade;
  proxy_read_timeout 120s;

  server {
    listen 8080;
    server_name localhost;

    # ── Admin Panel (/admin) ─────────────────────────────────────
    # Next.js basePath is set to /admin, so all routes & assets
    # are already prefixed — no rewrite needed.
    location /admin {
      proxy_pass http://localhost:3002;
    }

    # ── Seller Dashboard (/seller) ──────────────────────────────
    location /seller {
      proxy_pass http://localhost:3003;
    }

    # ── Backend API (/api) ──────────────────────────────────────
    location /api {
      proxy_pass http://localhost:3001;
      client_max_body_size 20M;
    }

    # ── Buyer Web App (/) ───────────────────────────────────────
    location / {
      proxy_pass http://localhost:3000;
    }
  }
}
