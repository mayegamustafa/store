version: '3.8'

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: totalstore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-totalstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-totalstore_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-totalstore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ---- Redis Cache ----
  redis:
    image: redis:7-alpine
    container_name: totalstore_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend API ----
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: totalstore_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/totalstore_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  # ---- Buyer Web App ----
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: totalstore_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      - api

  # ---- Admin Panel ----
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: totalstore_admin
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      - api

  # ---- Seller Dashboard ----
  seller:
    build:
      context: ./apps/seller
      dockerfile: Dockerfile
    container_name: totalstore_seller
    restart: unless-stopped
    ports:
      - "3003:3003"
    depends_on:
      - api

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: totalstore_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
      - admin
      - seller

  # ---- pgAdmin (dev only) ----
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: totalstore_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@totalstore.ug
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: totalstore_network
