# CodeMagic CI — one workflow per Flutter app (monorepo).
# In the CodeMagic UI pick the workflow you want, then Start new build.
# APKs are debug-signed unless a release keystore is configured in
# CodeMagic's Android code signing settings (fine for direct distribution).

definitions:
  env: &flutter_env
    flutter: stable
    java: 17
    android_signing:
      - totalstore_keystore
  scripts: &build_scripts
    - name: Flutter pub get
      script: flutter pub get
    - name: Set up release signing (uses the uploaded keystore when present)
      script: |
        if [ -n "${CM_KEYSTORE_PATH:-}" ]; then
          cat > android/key.properties <<EOF
        storeFile=$CM_KEYSTORE_PATH
        storePassword=$CM_KEYSTORE_PASSWORD
        keyAlias=$CM_KEY_ALIAS
        keyPassword=$CM_KEY_PASSWORD
        EOF
          echo "Release signing configured"
        else
          echo "No keystore uploaded — building debug-signed (in-place updates will NOT work)"
        fi
    - name: Build release APK
      script: flutter build apk --release

workflows:
  buyer-android:
    name: Buyer App — Android APK
    max_build_duration: 60
    working_directory: apps/mobile-buyer
    environment: *flutter_env
    scripts: *build_scripts
    artifacts:
      - build/**/outputs/**/*.apk
      - apps/mobile-buyer/build/**/outputs/**/*.apk

  seller-android:
    name: Seller App — Android APK
    max_build_duration: 60
    working_directory: apps/mobile-seller
    environment: *flutter_env
    scripts: *build_scripts
    artifacts:
      - build/**/outputs/**/*.apk
      - apps/mobile-seller/build/**/outputs/**/*.apk

  rider-android:
    name: Rider App — Android APK
    max_build_duration: 60
    working_directory: apps/mobile-rider
    environment: *flutter_env
    scripts: *build_scripts
    artifacts:
      - build/**/outputs/**/*.apk
      - apps/mobile-rider/build/**/outputs/**/*.apk
