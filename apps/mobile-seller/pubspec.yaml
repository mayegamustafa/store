name: total_store_seller
description: TotalStore Seller App - Manage your store on the go
publish_to: 'none'
version: 2.0.0+3

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  provider: ^6.1.1
  flutter_secure_storage: ^9.2.3
  go_router: ^14.3.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  fl_chart: ^0.69.0
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.2
  local_auth: ^2.3.0
  shimmer: ^3.0.0
  # Firebase (push notifications)
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  # M4a.1: installed-version detection for force-update flow
  package_info_plus: ^8.0.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#7c3aed"
  image: assets/images/app_logo.png
  android_12:
    color: "#7c3aed"
    image: assets/images/app_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

# Launcher icon pipeline: replace assets/icon.png (square PNG, >=1024px),
# run `dart run flutter_launcher_icons`, commit, and rebuild on CodeMagic.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21
