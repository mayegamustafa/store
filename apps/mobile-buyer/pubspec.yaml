name: total_store_buyer
description: TotalStore - Shop & Track Deliveries
publish_to: 'none'
version: 2.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.1.4

  # State management
  provider: ^6.1.2

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.0.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0

  # Animation
  lottie: ^3.3.1

  # Navigation
  go_router: ^14.8.1

  # Utils
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0
  package_info_plus: ^8.0.0
  image_picker: ^1.1.2

  # Biometric auth
  local_auth: ^2.3.0

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Maps & tracking
  google_maps_flutter: ^2.6.0
  socket_io_client: ^2.0.3+1

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Firebase (notifications)
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#0369a1"
  image: assets/images/app_logo.png
  android_12:
    color: "#0369a1"
    image: assets/images/app_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
