name: mobile_rider
description: TotalStore Rider App - Delivery management for Uganda/East Africa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Auth
  local_auth: ^2.3.0
  google_sign_in: ^6.2.1
  country_code_picker: ^3.0.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  # Navigation
  go_router: ^13.2.0
  # State management
  provider: ^6.1.2
  # HTTP
  dio: ^5.4.3+1
  # Storage
  flutter_secure_storage: ^9.0.0
  # Maps & Location
  google_maps_flutter: ^2.6.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  # Real-time
  socket_io_client: ^2.0.3+1
  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  # Background location
  background_fetch: ^1.2.4
  # Notifications
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.2
  flutter_local_notifications: ^17.1.2
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#064e3b"
  image: assets/images/app_logo.png
  android_12:
    color: "#064e3b"
    image: assets/images/app_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

# Launcher icon pipeline: replace assets/icon.png (square PNG, >=1024px),
# run `dart run flutter_launcher_icons`, commit, and rebuild on CodeMagic.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#F59E0B"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21
